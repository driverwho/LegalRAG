server {
    listen 80;
    server_name _;

    # ---- Vue SPA Static Files ----
    root /usr/share/nginx/html;
    index index.html;

    # Vue Router history mode: all non-file routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Reverse Proxy: Backend API ----
    # Frontend requests /api/vector/... -> forwarded to backend:5000
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout for long-running requests (document upload/processing)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # SSE / streaming response support (RAG chat may use this)
        proxy_buffering off;
        proxy_cache off;

        # Allow large file uploads (match your document upload needs)
        client_max_body_size 50m;
    }

    # ---- Static Asset Caching ----
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
}
